kind = "web"
previewPath = "/"
title = "Delivery Copilot — VC Pitch Demo"
version = "1.0.0"
id = "artifacts/demo"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25064

[services.development]
run = "pnpm --filter @workspace/demo run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/demo", "run", "build" ]
publicDir = "artifacts/demo/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25064"
BASE_PATH = "/"
