<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>StreetIQ — voice copilot demo</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Inter+Tight:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Manrope:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Newsreader:ital,wght@0,400;0,500;1,400;1,500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #ECECEC; font-family: Inter, system-ui, sans-serif; }
  * { box-sizing: border-box; }
  /* fit-to-viewport scaler */
  .stage-wrap { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #1C1B1A; }
  .stage { transform-origin: center center; }
</style>
</head>
<body>
<div class="stage-wrap"><div id="root" class="stage"></div></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx?v=3"></script>
<script type="text/babel" src="streetiq-panels.jsx?v=3"></script>

<script type="text/babel" data-presets="react">
function fit() {
  const el = document.getElementById('root');
  if (!el) return;
  const W = 1600, H = 900;
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  el.style.transform = `scale(${s})`;
  el.style.width = W + 'px';
  el.style.height = H + 'px';
}
window.addEventListener('resize', fit);
ReactDOM.createRoot(document.getElementById('root')).render(<window.StreetIQApp />);
requestAnimationFrame(fit);
</script>
</body>
</html>
