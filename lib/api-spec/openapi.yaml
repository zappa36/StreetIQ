openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: voice
    description: Voice classification and TTS operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /classify:
    post:
      operationId: classifyTranscript
      tags: [voice]
      summary: Classify driver voice transcript
      description: Classifies a driver's spoken transcript into an intent category using Anthropic Claude Haiku
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClassifyRequest"
      responses:
        "200":
          description: Classification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClassifyResponse"
  /tts:
    post:
      operationId: textToSpeech
      tags: [voice]
      summary: Text-to-speech synthesis
      description: Converts text to speech audio using OpenAI TTS (nova voice)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TtsRequest"
      responses:
        "200":
          description: Audio file (mp3)
          content:
            audio/mpeg:
              schema:
                type: string
                format: binary
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ClassifyRequest:
      type: object
      properties:
        transcript:
          type: string
          description: The driver's spoken transcript to classify
        mode:
          type: string
          enum: [intent, delay_details]
          default: intent
          description: |
            Classification mode. `intent` (default) returns an intent label and entity.
            `delay_details` is used as a follow-up after a `delay_reported` intent and
            extracts the delay duration and reason from the driver's reply.
      required:
        - transcript
    ClassifyResponse:
      type: object
      description: |
        Response shape depends on the request `mode`. In `intent` mode, `intent`/`entity`
        are populated. In `delay_details` mode, `minutes`/`reason` are populated.
      properties:
        intent:
          type: string
          enum: [road_closed, parking_issue, customer_not_home, delivery_complete, request_map, delay_reported, delay_details, general]
        entity:
          type: string
          description: Extracted street name, customer name, or parcel ID
        minutes:
          type: integer
          minimum: 1
          description: Estimated delay in minutes (delay_details mode only)
        reason:
          type: string
          description: Short phrase describing the cause of the delay (delay_details mode only)
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
      required:
        - confidence
    TtsRequest:
      type: object
      properties:
        text:
          type: string
          description: The text to synthesize
        voice:
          type: string
          description: The voice to use (alloy, nova, shimmer)
          default: nova
      required:
        - text
